services:
  confluence-mcp:
    build: .
    container_name: confluence-mcp
    ports:
      - "8765:8765"
    env_file:
      - .env
    environment:
      # Override .env: inside the container we must bind on all interfaces,
      # otherwise the published port can't reach the process.
      HOST: 0.0.0.0
      PORT: 8765
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8765/healthz',timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
